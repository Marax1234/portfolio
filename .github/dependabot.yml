# Dependabot — §3.4 (Actions-Updates) und Unterstützung für §5.2 (SCA)
#
# §3.4 — Dependabot-Alerts/Updates für GitHub Actions sind aktiv; Updates kommen
#         als PR und durchlaufen vor dem Merge dieselben Security-Gates + Review.
# §5.2  — npm/pnpm-Ökosystem wird auf verwundbare Dependencies überwacht.
#
# Hinweis: Dependabot hält die in den Workflows gepinnten Commit-SHAs (§3.1)
# aktuell, indem es PRs mit dem jeweils neuen SHA + Versionskommentar öffnet.

version: 2
updates:
  # GitHub Actions auf Commit-SHA gepinnt halten (§3.1/§3.2/§3.4)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "security"
      - "dependencies"
    commit-message:
      prefix: "ci"

  # Anwendungs-Dependencies (pnpm) — Supply-Chain-Überwachung (§5.2)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "security"
      - "dependencies"
    commit-message:
      prefix: "deps"
    groups:
      # Patch-/Minor-Updates bündeln, um PR-Rauschen zu reduzieren.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
